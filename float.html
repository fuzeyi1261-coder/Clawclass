<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: http: https:; connect-src 'self' http: https: ws: wss:;">
  <title>悬浮球</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 50px;
      height: 50px;
      overflow: hidden;
      background: transparent;
      user-select: none;
      -webkit-app-region: drag;
    }

    .float-ball {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
      -webkit-app-region: no-drag;
      transition: all 0.2s ease;
    }

    /* 左侧按钮 - 右圆角 */
    body.left .float-ball {
      border-radius: 8px 16px 16px 8px;
    }

    /* 右侧按钮 - 左圆角 */
    body.right .float-ball {
      border-radius: 16px 8px 8px 16px;
    }

    .float-ball:hover {
      box-shadow: 0 6px 16px rgba(99, 102, 241, 0.6);
      transform: scale(1.05);
    }

    .float-ball:active {
      box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
      transform: scale(0.98);
    }

    .float-ball .icon {
      font-size: 20px;
      filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.2));
      pointer-events: none;
    }

    /* 脉冲动画 */
    .pulse {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: rgba(99, 102, 241, 0.3);
      animation: pulse 2s infinite;
      pointer-events: none;
    }

    @keyframes pulse {
      0% {
        transform: scale(1);
        opacity: 0.8;
      }
      50% {
        transform: scale(1.3);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 0;
      }
    }

    /* 确保在最上层 */
    .float-ball {
      position: relative;
      z-index: 10;
    }
  </style>
</head>
<body class="left">
  <div class="float-ball" id="floatBall">
    <span class="icon">⚡</span>
    <div class="pulse"></div>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    // 获取当前是哪个悬浮球（从URL参数）
    const urlParams = new URLSearchParams(window.location.search);
    const side = urlParams.get('side') || 'left';

    // 设置对应的 class
    document.body.className = side;

    const floatBall = document.getElementById('floatBall');
    let isDragging = false;
    let startX, startY;
    const DRAG_THRESHOLD = 5;

    // 鼠标按下
    floatBall.addEventListener('mousedown', (e) => {
      isDragging = false;
      startX = e.clientX;
      startY = e.clientY;
    });

    // 鼠标移动
    document.addEventListener('mousemove', (e) => {
      if (!isDragging && startX !== undefined) {
        const deltaX = Math.abs(e.clientX - startX);
        const deltaY = Math.abs(e.clientY - startY);
        if (deltaX > DRAG_THRESHOLD || deltaY > DRAG_THRESHOLD) {
          isDragging = true;
        }
      }
    });

    // 点击事件
    floatBall.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      
      if (!isDragging) {
        // 发送点击事件，告知是哪个悬浮球被点击
        ipcRenderer.send('float-click', side);
      }
      
      isDragging = false;
      startX = undefined;
      startY = undefined;
    });

    // 防止右键菜单
    floatBall.addEventListener('contextmenu', (e) => {
      e.preventDefault();
    });
  </script>
</body>
</html>
