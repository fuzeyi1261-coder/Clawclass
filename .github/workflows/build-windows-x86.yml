name: Build Windows x86

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows-x86:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        architecture: 'x86'
        
    - name: Verify architecture
      run: |
        node -e "console.log('Architecture:', process.arch); console.log('Platform:', process.platform);"
        
    - name: Install dependencies
      run: npm install
      
    - name: Build for Windows x86
      run: npm run dist:win:x86
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: List output files
      run: dir release
        
    - name: Upload Windows x86 installer
      uses: actions/upload-artifact@v4
      with:
        name: Clawclass-Windows-x86
        path: release/*.exe
        retention-days: 30
